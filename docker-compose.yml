services:
  postgres:
      image: postgres:18
      restart: always
      environment:
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_DB: ${POSTGRES_DB}
      networks:
        - pahra-network
      ports:
        - 5432:5432
      volumes:
        - postgres_data:/var/lib/postgresql/data

  pahrawebapi:
    image: pahrawebapi
    build:
      context: .
      dockerfile: src/Pahra.WebApi/Dockerfile
    ports:
      - 5200:5200
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection}
    depends_on:
      - postgres
    networks:
      - pahra-network

networks:
  pahra-network:
    driver: bridge
volumes:
  postgres_data:
